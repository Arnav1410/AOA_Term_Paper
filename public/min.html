<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min-Knapsack Solver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-8 font-sans text-gray-800">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md flex flex-col md:flex-row gap-8">
        <div class="flex-1">
            <a href="index.html" class="text-blue-600 hover:text-blue-800 font-semibold text-sm mb-4 inline-block">&larr; Back to Home</a>
            
            <h2 class="text-2xl font-bold mb-4 text-blue-600">Parameters</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium">Target Min Profit (P)</label>
                    <input type="number" id="minProfit" value="130" class="mt-1 p-2 border rounded w-full">
                </div>
                <div>
                    <label class="block text-sm font-medium">FPTAS Epsilon (ε)</label>
                    <input type="number" step="0.1" id="epsilon" value="0.5" class="mt-1 p-2 border rounded w-full">
                </div>
            </div>

            <h3 class="text-lg font-semibold mb-2 flex justify-between items-center">
                Items 
                <button onclick="addItem()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600">+ Add</button>
            </h3>
            
            <div class="flex gap-2 items-center px-2 mb-1 text-xs font-bold text-gray-500 uppercase tracking-wider">
                <span class="w-6">ID</span>
                <span class="w-full ml-1">Profit (Value)</span>
                <span class="w-full ml-1">Size (Weight)</span>
                <span class="w-6"></span>
            </div>
            
            <div id="itemsList" class="space-y-2 mb-6 max-h-64 overflow-y-auto pr-2"></div>

            <button onclick="solveKnapsack()" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition">
                Solve & Compare
            </button>
        </div>

        <div class="flex-1 flex flex-col">
            <h2 class="text-2xl font-bold mb-4 mt-8 md:mt-0 text-blue-600">Results</h2>
            
            <div class="grid grid-cols-3 gap-4 mb-2 text-center">
                <div class="bg-gray-50 p-4 rounded-t border-t border-l border-r">
                    <p class="text-xs text-gray-500 font-bold uppercase">Exact DP</p>
                    <p id="resExact" class="text-2xl font-bold text-gray-800">-</p>
                </div>
                <div class="bg-blue-50 p-4 rounded-t border-t border-l border-r border-blue-200">
                    <p class="text-xs text-blue-500 font-bold uppercase">FPTAS</p>
                    <p id="resFptas" class="text-2xl font-bold text-blue-800">-</p>
                </div>
                <div class="bg-purple-50 p-4 rounded-t border-t border-l border-r border-purple-200">
                    <p class="text-xs text-purple-600 font-bold uppercase">LP Relaxation</p>
                    <p id="resLp" class="text-2xl font-bold text-purple-800">-</p>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-4 mb-6 text-center text-xs">
                <div class="bg-gray-100 p-2 rounded-b border-b border-l border-r">
                    <p class="text-gray-600">Time: <span id="timeExact" class="font-bold">-</span> ms</p>
                    <p class="text-gray-600">Array: <span id="dpExact" class="font-bold">-</span></p>
                </div>
                <div class="bg-blue-100 p-2 rounded-b border-b border-l border-r border-blue-200">
                    <p class="text-blue-700">Time: <span id="timeFptas" class="font-bold">-</span> ms</p>
                    <p class="text-blue-700">Array: <span id="dpFptas" class="font-bold">-</span></p>
                </div>
                <div class="bg-purple-100 p-2 rounded-b border-b border-l border-r border-purple-200">
                    <p class="text-purple-700">Time: <span id="timeLp" class="font-bold">-</span> ms</p>
                    <p class="text-purple-700">O(N log N) Sort</p>
                </div>
            </div>

            <div class="flex-1 min-h-[300px]">
                <canvas id="comparisonChart"></canvas>
            </div>
        </div>
    </div>
    <script src="min.js"></script>
</body>
</html>
